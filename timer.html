<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timer App</title>
<link rel="stylesheet" href="timer.css">
</head>

<body>

<h2>Timer Application</h2>

<div class="timer" id="display">00:00:00</div>

<p id="status">Status: Reset</p>

<div class="buttons">
<button id="startBtn" class="start">Start (S)</button>
<button id="pauseBtn" class="pause">Pause (P)</button>
<button id="resetBtn" class="reset">Reset (R)</button>
</div>

<script src="timer.js"></script>
</body>
</html>
